<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qwan Ki Do Club Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'deep-navy': '#0a192f',
              'light-navy': '#112240',
              'navy-card-mobile': '#1d2d50',
              'orange-300': '#fdba74',
              'brand-primary': '#3D3D99',      // Albastru Închis
              'brand-secondary': '#4DBCE9',   // Albastru Deschis
              'status-success': '#16a34a',     // Verde (green-600)
              'status-danger': '#dc2626',      // Roșu (red-600)
              'status-warning': '#f59e0b',     // Galben (amber-500)
              'primary': { // Paleta originala pentru compatibilitate
                '50': '#eff6ff',
                '100': '#dbeafe',
                '200': '#bfdbfe',
                '300': '#93c5fd',
                '400': '#60a5fa',
                '500': '#3b82f6',
                '600': '#2563eb',
                '700': '#1d4ed8',
                '800': '#1e40af',
                '900': '#1e3a8a',
                '950': '#172554'
              }
            },
            boxShadow: {
              'glow-blue': '0 0 12px 3px rgba(77, 188, 233, 0.25)',
            },
            animation: {
              'fade-in-down': 'fade-in-down 0.5s ease-out forwards'
            },
            keyframes: {
              'fade-in-down': {
                '0%': {
                  opacity: '0',
                  transform: 'translateY(-20px)'
                },
                '100%': {
                  opacity: '1',
                  transform: 'translateY(0)'
                },
              }
            }
          }
        }
      }
    </script>
    <style>
      * {
        color-scheme: dark;
      }
      :root {
        --main-bg: #0a192f;
        --card-bg: #112240;
        --card-mobile-bg: #1d2d50;
        --text-primary: #e2e8f0;
        --text-secondary: #94a3b8;
        --text-tertiary: #64748b;
        --border-color: #1e293b;
        --border-color-light: #334155;
        --table-header-bg: #1e293b;
        --table-row-hover-bg: rgba(45, 55, 72, 0.5); /* slate-700/50 */
        --brand-primary: #3D3D99;
        --brand-secondary: #4DBCE9;
      }
      body {
        background-color: var(--main-bg);
        color: var(--text-primary);
      }
      h1, h2 {
        color: white;
      }
      @media print {
        body * {
          visibility: hidden;
        }
        #printable-area, #printable-area * {
          visibility: visible;
        }
        #printable-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          height: auto;
          padding: 1rem;
          color: black !important;
          background-color: white !important;
        }
        .no-print {
          display: none !important;
        }
        #printable-area table {
          width: 100%;
          border-collapse: collapse;
          -webkit-print-color-adjust: exact; 
          print-color-adjust: exact;
        }
        #printable-area th, #printable-area td {
          border: 1px solid #ddd;
          padding: 8px;
          font-size: 10pt;
        }
        #printable-area th {
          background-color: #f2f2f2 !important;
        }
        #printable-area h1, #printable-area h2, #printable-area h3, #printable-area p {
            color: black !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^18.3.1",
    "react-dom/": "https://esm.sh/react-dom@^18.3.1/",
    "react/": "https://esm.sh/react@^18.3.1/",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.43.4",
    "recharts": "https://esm.sh/recharts@^2.12.7",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
