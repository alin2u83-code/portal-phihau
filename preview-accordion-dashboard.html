<style>
  body { background: #0f172a; font-family: ui-sans-serif, system-ui, sans-serif; }
  .chevron { transition: transform 0.2s ease; }
  .chevron.open { transform: rotate(180deg); }
  .accordion-body { animation: fadeIn 0.15s ease-out; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

  /* Phone frame */
  .phone-frame {
    width: 375px;
    min-height: 812px;
    border-radius: 40px;
    border: 8px solid #334155;
    box-shadow: 0 0 0 2px #1e293b, 0 30px 80px rgba(0,0,0,0.6);
    overflow: hidden;
    position: relative;
    background: #020617;
  }
  .phone-notch {
    height: 28px;
    background: #020617;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .phone-notch-bar { width: 100px; height: 18px; background: #334155; border-radius: 20px; }

  /* Tablet frame */
  .tablet-frame {
    width: 768px;
    min-height: 600px;
    border-radius: 16px;
    border: 6px solid #334155;
    box-shadow: 0 0 0 2px #1e293b, 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
    background: #020617;
  }

  /* Desktop frame */
  .desktop-frame {
    width: 100%;
    min-height: 560px;
    border-radius: 12px;
    border: 4px solid #334155;
    box-shadow: 0 0 0 2px #1e293b;
    overflow: hidden;
    background: #020617;
  }

  .frame-content { overflow-y: auto; }

  /* Quick access scroll */
  .qa-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .qa-scroll::-webkit-scrollbar { display: none; }
</style>

// ===== STATE =====
let currentRole = 'admin_club';
let openSection = { 'admin_club': 'membri', 'super_admin': 'gestiune' };

// ===== RENDER =====
const COLOR_MAP = {
  emerald: { bg: 'bg-emerald-500/15', border: 'border-emerald-500/30', icon: 'text-emerald-400', text: 'text-emerald-300' },
  rose:    { bg: 'bg-rose-500/15',    border: 'border-rose-500/30',    icon: 'text-rose-400',    text: 'text-rose-300' },
  sky:     { bg: 'bg-sky-500/15',     border: 'border-sky-500/30',     icon: 'text-sky-400',     text: 'text-sky-300' },
  slate:   { bg: 'bg-slate-800/60',   border: 'border-slate-700/50 border-dashed', icon: 'text-slate-500', text: 'text-slate-600' },
};

function renderQuickAccess() {
  return `
    <div>
      <p class="text-[10px] font-bold text-slate-600 uppercase tracking-wider mb-2 px-0.5">Acces rapid</p>
      <div class="qa-scroll flex gap-2 pb-1">
        ${QUICK_ACCESS.map(qa => {
          const c = COLOR_MAP[qa.color] || COLOR_MAP.slate;
          return `
            <button class="shrink-0 flex flex-col items-center gap-1.5 p-3 rounded-xl ${c.bg} border ${c.border} hover:opacity-80 transition-opacity w-20 relative">
              ${qa.badge ? `<span class="absolute top-1.5 right-1.5 flex h-4 w-4 items-center justify-center rounded-full bg-red-500 text-[9px] font-bold text-white">${qa.badge}</span>` : ''}
              <span class="${c.icon}">${qa.icon}</span>
              <span class="text-[11px] font-semibold text-white leading-tight text-center">${qa.label}</span>
              <span class="text-[9px] ${c.text} text-center leading-tight">${qa.sublabel}</span>
            </button>`;
        }).join('')}
      </div>
    </div>`;
}

function renderAccordionItem(section, role, isOpen, isSuperAdmin = false) {
  const bodyId = `body-${section.id}-${role}`;
  const chevronId = `chev-${section.id}-${role}`;

  const items = isSuperAdmin
    ? section.items.map(it => `
        <button class="flex items-center gap-2 p-2.5 rounded-lg bg-slate-900 border border-slate-800 hover:border-slate-600 hover:bg-slate-800 transition-all text-left w-full">
          <div class="shrink-0 p-1 bg-slate-800 rounded-md">
            <svg class="w-3.5 h-3.5 ${it.color || 'text-amber-400'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          </div>
          <span class="text-xs text-slate-300 leading-tight">${it.label}</span>
        </button>`).join('')
    : section.items.map(it => `
        <div class="relative flex items-center gap-2.5 p-3 rounded-lg bg-slate-800/60 border border-slate-700/50 hover:border-amber-400/40 hover:bg-slate-700/70 cursor-pointer transition-colors w-full">
          ${it.icon}
          <span class="text-sm font-medium text-slate-200">${it.label}</span>
          ${it.badge ? `<span class="absolute top-1.5 right-1.5 flex h-4 w-4 items-center justify-center rounded-full bg-red-500 text-[9px] font-bold text-white">${it.badge}</span>` : ''}
        </div>`).join('');

  return `
    <div class="border border-slate-700/50 rounded-lg overflow-hidden">
      <button onclick="toggleSection('${section.id}','${role}')"
        class="w-full flex items-center justify-between px-3 py-2.5 bg-slate-800/60 hover:bg-slate-700/60 transition-colors text-left">
        <div class="flex items-center gap-2.5">
          ${section.icon}
          <span class="font-semibold text-slate-200 text-xs uppercase tracking-wide">${section.label}</span>
        </div>
        <svg id="${chevronId}" class="chevron ${isOpen ? 'open' : ''} w-4 h-4 text-slate-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <div id="${bodyId}" class="${isOpen ? '' : 'hidden'} accordion-body p-2 bg-slate-900/40 space-y-1.5">
        ${items}
      </div>
    </div>`;
}

function renderAdminClub() {
  const open = openSection['admin_club'];
  const sections = ADMIN_CLUB_SECTIONS.map(s => renderAccordionItem(s, 'admin_club', s.id === open, false)).join('');
  return `
    <div class="space-y-3">
      <div>
        <h1 class="text-base font-bold text-white">Bună ziua, Admin!</h1>
        <p class="text-slate-500 text-xs">Ce facem azi?</p>
      </div>
      ${renderQuickAccess()}
      <div>
        <p class="text-[10px] font-bold text-slate-600 uppercase tracking-wider mb-2 px-0.5">Module</p>
        <div class="space-y-1.5">${sections}</div>
      </div>
    </div>`;
}

function renderSuperAdmin() {
  const open = openSection['super_admin'];
  const stats = `
    <div class="grid grid-cols-2 gap-2">
      ${[
        { label: 'Sportivi', val: '3,412', color: 'text-sky-400' },
        { label: 'Plăți', val: '8,924', color: 'text-emerald-400' },
        { label: 'Cluburi', val: '35', color: 'text-amber-400' },
        { label: 'Utilizatori', val: '142', color: 'text-violet-400' },
      ].map(s => `
        <div class="p-3 bg-slate-900 border border-slate-800 rounded-xl">
          <p class="text-[10px] text-slate-500 mb-1">${s.label}</p>
          <p class="text-xl font-bold ${s.color}">${s.val}</p>
        </div>`).join('')}
    </div>`;

  const sections = SUPER_ADMIN_SECTIONS.map(s => renderAccordionItem(s, 'super_admin', s.id === open, true)).join('');
  return `
    <div class="space-y-3">
      <div>
        <h1 class="text-base font-bold text-white">Panou Administrativ</h1>
        <p class="text-slate-500 text-xs">Super Admin Federație</p>
      </div>
      ${stats}
      ${renderQuickAccess()}
      <div>
        <p class="text-[10px] font-bold text-slate-600 uppercase tracking-wider mb-2 px-0.5">Module</p>
        <div class="space-y-1.5">${sections}</div>
      </div>
    </div>`;
}

function renderAll() {
  const html = currentRole === 'admin_club' ? renderAdminClub() : renderSuperAdmin();
  ['phone','tablet','desktop'].forEach(vp => {
    const el = document.getElementById(`content-${vp}`);
    if (el) el.innerHTML = html;
  });
}

// ===== ACTIONS =====
function toggleSection(sectionId, role) {
  const prev = openSection[role];
  openSection[role] = prev === sectionId ? null : sectionId;
  renderAll();
}

function switchRole(role) {
  currentRole = role;
  openSection = { admin_club: 'membri', super_admin: 'gestiune' };
  renderAll();
  const isClub = role === 'admin_club';
  document.getElementById('btn-admin-club').className = `px-3 py-1.5 rounded-md text-xs font-semibold transition-all ${isClub ? 'bg-amber-500 text-slate-900' : 'text-slate-400 hover:text-white'}`;
  document.getElementById('btn-super-admin').className = `px-3 py-1.5 rounded-md text-xs font-semibold transition-all ${!isClub ? 'bg-amber-500 text-slate-900' : 'text-slate-400 hover:text-white'}`;
}

let activeVP = 'phone';
function switchViewport(vp) {
  ['phone','tablet','desktop'].forEach(v => {
    const frame = document.getElementById(`frame-${v}`);
    if (frame) frame.classList.toggle('hidden', v !== vp);
    const btn = document.getElementById(`vp-${v}`);
    if (btn) btn.className = `px-3 py-1.5 rounded-md text-xs font-semibold transition-all ${v === vp ? 'bg-amber-500 text-slate-900' : 'text-slate-400 hover:text-white'}`;
  });

  const container = document.getElementById('viewport-container');
  if (vp === 'phone') {
    container.className = 'flex justify-center items-start min-h-screen pt-8 pb-16 px-4';
  } else if (vp === 'tablet') {
    container.className = 'flex justify-center items-start min-h-screen pt-8 pb-16 px-4 overflow-x-auto';
  } else {
    container.className = 'flex justify-center items-start min-h-screen pt-8 pb-16 px-4';
  }
  activeVP = vp;
}

// ===== INIT =====
renderAll();
// default: phone visible
document.getElementById('frame-tablet').classList.add('hidden');
document.getElementById('frame-desktop').classList.add('hidden');
</script>
