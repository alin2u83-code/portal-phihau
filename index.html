<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qwan Ki Do Club Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              'status-success': '#16a34a',
              'status-danger': '#dc2626',
              'status-warning': '#f59e0b',
            },
            boxShadow: {
              'glow-blue': '0 0 12px 3px rgba(29, 78, 216, 0.25)',
              'glow-secondary': '0 0 15px 4px rgba(100, 255, 218, 0.4)',
            },
            animation: {
              'fade-in-down': 'fade-in-down 0.5s ease-out forwards',
              'glow-pulse': 'glow-pulse 2s ease-in-out forwards',
              'subtle-bounce-in': 'subtle-bounce-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards'
            },
            keyframes: {
              'fade-in-down': {
                '0%': {
                  opacity: '0',
                  transform: 'translateY(-20px)'
                },
                '100%': {
                  opacity: '1',
                  transform: 'translateY(0)'
                },
              },
              'glow-pulse': {
                  '0%, 100%': { boxShadow: '0 0 10px 2px rgba(100, 255, 218, 0.3)' },
                  '50%': { boxShadow: '0 0 20px 5px rgba(100, 255, 218, 0.6)' },
              },
              'subtle-bounce-in': {
                  '0%': { transform: 'scale(0.9)', opacity: '0' },
                  '60%': { transform: 'scale(1.05)', opacity: '1' },
                  '100%': { transform: 'scale(1)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
      * {
        color-scheme: dark;
      }
      :root {
        --bg-main: #0a192f;
        --bg-card: #112240;
        --bg-card-hover: #1d2f50;
        --bg-input: #1e293b;
        --bg-table-header: #1e293b;
        --bg-table-row-hover: #172a46;
        --accent: #1d4ed8;
        --accent-hover: #1e40af;
        --text-primary: #ffffff;
        --text-secondary: #94a3b8;
        --border-color: #334155;
        --brand-primary: #1d4ed8;
        --brand-secondary: #64ffda;
      }
      body {
        background-color: var(--bg-main);
        color: var(--text-primary);
        font-family: 'Inter', sans-serif;
        letter-spacing: 0.02em;
      }
      h1, h2 {
        color: white;
      }
      .selected-row-highlight {
        outline: 2px solid var(--brand-secondary);
        outline-offset: -2px;
        background-color: rgba(100, 255, 218, 0.1);
      }

      .sesiune-card {
        transition: all 0.3s ease-in-out;
      }
      .sesiune-card:hover {
        border-color: rgba(251, 191, 36, 0.5); /* amber-400/50 */
        transform: translateY(-4px);
        box-shadow: 0 0 15px 2px rgba(251, 146, 60, 0.4);
      }

      @media print {
        body * {
          visibility: hidden;
        }
        #printable-area, #printable-area *, #lista-prezenta-print-area, #lista-prezenta-print-area * {
          visibility: visible;
        }
        #printable-area, #lista-prezenta-print-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          height: auto;
          padding: 1rem;
          color: black !important;
          background-color: white !important;
        }
        .no-print {
          display: none !important;
        }
        #printable-area table, #lista-prezenta-print-area table {
          width: 100%;
          border-collapse: collapse;
          -webkit-print-color-adjust: exact; 
          print-color-adjust: exact;
        }
        #printable-area th, #printable-area td, #lista-prezenta-print-area th, #lista-prezenta-print-area td {
          border: 1px solid #333;
          padding: 8px;
          font-size: 10pt;
        }
        #printable-area th, #lista-prezenta-print-area th {
          background-color: #f2f2f2 !important;
        }
        #printable-area h1, #printable-area h2, #printable-area h3, #printable-area p,
        #lista-prezenta-print-area h1, #lista-prezenta-print-area h2, #lista-prezenta-print-area h3, #lista-prezenta-print-area p {
            color: black !important;
        }

        /* Stiluri specifice pentru lista de prezență */
        #lista-prezenta-print-area {
            padding: 2rem;
        }
        #lista-prezenta-print-area h1 { font-size: 20pt; font-weight: bold; text-align: center; margin-bottom: 0.5rem; }
        #lista-prezenta-print-area .details { text-align: center; margin-bottom: 2rem; font-size: 12pt; }
        #lista-prezenta-print-area .group-header td { background-color: #e0e0e0 !important; font-weight: bold; text-align: center; }
        #lista-prezenta-print-area .signature-col { width: 30%; }
        #lista-prezenta-print-area .signature-area { margin-top: 4rem; padding-top: 1rem; border-top: 1px solid #ccc; display: flex; justify-content: space-between; font-size: 11pt; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^18.3.1",
    "react-dom/": "https://esm.sh/react-dom@^18.3.1/",
    "react/": "https://esm.sh/react@^18.3.1/",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.43.4",
    "recharts": "https://esm.sh/recharts@^2.12.7",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "dotenv": "https://esm.sh/dotenv@^17.2.3",
    "react-router-dom": "https://esm.sh/react-router-dom@6.23.1",
    "papaparse": "https://esm.sh/papaparse@5.4.1",
    "react-native": "https://esm.sh/react-native@^0.83.1",
    "vite-plugin-pwa": "https://esm.sh/vite-plugin-pwa@^1.2.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3",
    "vite": "https://esm.sh/vite@^7.3.1"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
