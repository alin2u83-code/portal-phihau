<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qwan Ki Do Club Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'brand-primary': '#3D3D99',      // Albastru Închis
              'brand-secondary': '#4DBCE9',   // Albastru Deschis
              'status-success': '#16a34a',     // Verde (green-600)
              'status-danger': '#dc2626',      // Roșu (red-600)
              'status-warning': '#f59e0b',     // Galben (amber-500)
              'primary': { // Paleta originala pentru compatibilitate
                '50': '#eff6ff',
                '100': '#dbeafe',
                '200': '#bfdbfe',
                '300': '#93c5fd',
                '400': '#60a5fa',
                '500': '#3b82f6',
                '600': '#2563eb',
                '700': '#1d4ed8',
                '800': '#1e40af',
                '900': '#1e3a8a',
                '950': '#172554'
              }
            },
            animation: {
              'fade-in-down': 'fade-in-down 0.5s ease-out forwards',
              'pulse-border': 'pulse-border 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'pulse-amber-border': 'pulse-amber-border 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              'fade-in-down': {
                '0%': {
                  opacity: '0',
                  transform: 'translateY(-20px)'
                },
                '100%': {
                  opacity: '1',
                  transform: 'translateY(0)'
                },
              },
               'pulse-border': {
                '0%, 100%': { 'border-color': 'rgba(220, 38, 38, 0.8)' }, // red-600
                '50%': { 'border-color': 'rgba(220, 38, 38, 0.2)' },
              },
               'pulse-amber-border': {
                '0%, 100%': { 'border-color': 'rgba(245, 158, 11, 0.8)' }, // amber-500
                '50%': { 'border-color': 'rgba(245, 158, 11, 0.2)' },
              }
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^18.3.1",
    "react-dom/": "https://esm.sh/react-dom@^18.3.1/",
    "react/": "https://esm.sh/react@^18.3.1/",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.43.4",
    "recharts": "https://esm.sh/recharts@^2.12.7"
  }
}
</script>
</head>
  <body class="bg-brand-primary text-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
