<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qwan Ki Do Club Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              'brand-primary': '#1d4ed8',
              'brand-secondary': '#1d4ed8',
              'status-success': '#16a34a',
              'status-danger': '#dc2626',
              'status-warning': '#f59e0b',
            },
            boxShadow: {
              'glow-blue': '0 0 12px 3px rgba(29, 78, 216, 0.25)',
            },
            animation: {
              'fade-in-down': 'fade-in-down 0.5s ease-out forwards'
            },
            keyframes: {
              'fade-in-down': {
                '0%': {
                  opacity: '0',
                  transform: 'translateY(-20px)'
                },
                '100%': {
                  opacity: '1',
                  transform: 'translateY(0)'
                },
              }
            }
          }
        }
      }
    </script>
    <style>
      * {
        color-scheme: dark;
      }
      :root {
        --bg-main: #0a192f;
        --bg-card: #112240;
        --bg-input: #1e293b;
        --accent: #1d4ed8;
        --accent-hover: #1e40af;
        --text-primary: #ffffff;
        --text-secondary: #94a3b8;
        --border-color: #334155;
      }
      body {
        background-color: var(--bg-main);
        color: var(--text-primary);
        font-family: 'Inter', sans-serif;
        letter-spacing: 0.02em;
      }
      h1, h2 {
        color: white;
      }
      @media print {
        body * {
          visibility: hidden;
        }
        #printable-area, #printable-area * {
          visibility: visible;
        }
        #printable-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          height: auto;
          padding: 1rem;
          color: black !important;
          background-color: white !important;
        }
        .no-print {
          display: none !important;
        }
        #printable-area table {
          width: 100%;
          border-collapse: collapse;
          -webkit-print-color-adjust: exact; 
          print-color-adjust: exact;
        }
        #printable-area th, #printable-area td {
          border: 1px solid #ddd;
          padding: 8px;
          font-size: 10pt;
        }
        #printable-area th {
          background-color: #f2f2f2 !important;
        }
        #printable-area h1, #printable-area h2, #printable-area h3, #printable-area p {
            color: black !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^18.3.1",
    "react-dom/": "https://esm.sh/react-dom@^18.3.1/",
    "react/": "https://esm.sh/react@^18.3.1/",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.43.4",
    "recharts": "https://esm.sh/recharts@^2.12.7",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
